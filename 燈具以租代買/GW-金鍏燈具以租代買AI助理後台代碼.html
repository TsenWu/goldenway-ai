<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;family=Noto+Sans+TC:wght@400;500;700&amp;display=swap" rel="stylesheet">
<style type="text/css">
  /* 核心動畫與樣式定義：獨立命名防止全域污染 */
  @keyframes gw-ai-pop-in {
    0% { opacity: 0; transform: scale(0.8) translateY(40px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* 隱藏用來控制狀態的 checkbox */
  #GW-AI-Toggle-Checkbox {
    display: none !important;
  }

  /* 懸浮按鈕樣式 (使用 label 作為觸發器) */
  #GW-金鍏燈具以租代買AI助理-Trigger {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, #ca8a04 0%, #b45309 100%);
    border-radius: 50%;
    box-shadow: 0 8px 24px rgba(202, 138, 4, 0.3);
    cursor: pointer;
    z-index: 99999;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  #GW-金鍏燈具以租代買AI助理-Trigger:hover {
    transform: scale(1.1);
    box-shadow: 0 12px 30px rgba(202, 138, 4, 0.45);
  }

  /* 當 Checkbox 被勾選時，Trigger 按鈕旋轉 */
  #GW-AI-Toggle-Checkbox:checked ~ #GW-金鍏燈具以租代買AI助理-Trigger {
    transform: rotate(90deg);
  }

  /* 對話視窗容器 (預設隱藏) */
  #GW-金鍏燈具以租代買AI助理-Wrapper {
    position: fixed;
    bottom: 105px;
    right: 30px;
    width: 420px;
    height: 620px;
    z-index: 99998;
    display: none;
    flex-direction: column;
    box-sizing: border-box;
  }

  /* 當 Checkbox 被勾選時，展開視窗並執行彈出動畫 */
  #GW-AI-Toggle-Checkbox:checked ~ #GW-金鍏燈具以租代買AI助理-Wrapper {
    display: flex;
    animation: gw-ai-pop-in 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  /* 控制按鈕圖標的切換：勾選前顯示對話圖標，勾選後顯示關閉叉叉 */
  #GW-AI-Toggle-Checkbox:checked ~ #GW-金鍏燈具以租代買AI助理-Trigger #GW-AI-icon-chat {
    display: none !important;
  }
  #GW-AI-Toggle-Checkbox:checked ~ #GW-金鍏燈具以租代買AI助理-Trigger #GW-AI-icon-close {
    display: block !important;
  }

  /* Iframe 邊框與陰影美化 */
  #GW-金鍏燈具以租代買AI助理-Wrapper iframe {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 20px;
    box-shadow: 0 12px 40px rgba(15, 23, 42, 0.16);
    background-color: transparent;
  }

  /* 手機版響應式優化 */
  @media (max-width: 480px) {
    #GW-金鍏燈具以租代買AI助理-Trigger {
      bottom: 20px;
      right: 20px;
      width: 54px;
      height: 54px;
    }
    #GW-金鍏燈具以租代買AI助理-Wrapper {
      bottom: 85px;
      right: 15px;
      left: 15px;
      width: calc(100% - 30px);
      height: calc(100% - 110px);
    }
  }
</style>

<!-- 用來儲存狀態的隱藏 checkbox -->
<input type="checkbox" id="GW-AI-Toggle-Checkbox">

<!-- 懸浮對話按鈕 (使用 label 綁定 checkbox ID 來完成點擊觸發) -->
<label id="GW-金鍏燈具以租代買AI助理-Trigger" for="GW-AI-Toggle-Checkbox" title="開啟 AI 客服助理">
  <!-- 對話星芒圖標 -->
  <svg id="GW-AI-icon-chat" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
  </svg>
  <!-- 關閉叉叉圖標 (預設隱藏) -->
  <svg id="GW-AI-icon-close" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
    <line x1="18" y1="6" x2="6" y2="18"></line>
    <line x1="6" y1="6" x2="18" y2="18"></line>
  </svg>
</label>

<!-- 對話視窗 HTML 結構 -->
<div id="GW-金鍏燈具以租代買AI助理-Wrapper">
  <iframe 
    src="https://tsenwu.github.io/goldenway-ai/燈具以租代買/燈具以租代買AI助理.html" 
    scrolling="no"
    loading="lazy">
  </iframe>
</div>
